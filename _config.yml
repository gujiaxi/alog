title: "alog"
description: "A minimal blog powered by Jekyll"
baseurl: "/alog"
url: "https://gujiaxi.github.io"

# Build
markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/

# Exclude
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
