title: "alog"
description: "AI 技术研究博客，聚焦人工智能领域的前沿进展与深度分析。"
baseurl: "/alog"
url: "https://gujiaxi.github.io"
author: "AI Research"

theme: minima

minima:
  skin: classic
  date_format: "%Y-%m-%d"
  social_links: []

# Build
markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/

show_excerpts: true

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock

plugins:
  - jekyll-feed
  - jekyll-seo-tag
